<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="theme-color" content="#28282b">
    <title></title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- 自定义标题栏 -->
    <div class="titlebar" data-tauri-drag-region>
        <div class="titlebar-title" data-tauri-drag-region>
            <img src="assets/icon.png" alt="" class="titlebar-icon">
            <span></span>
        </div>
        <div class="titlebar-controls">
            <button class="titlebar-button" id="titlebar-minimize" aria-label="最小化" title="最小化">
                <span>−</span>
            </button>
            <button class="titlebar-button" id="titlebar-maximize" aria-label="最大化" title="最大化">
                <span class="maximize-icon"></span>
            </button>
            <button class="titlebar-button titlebar-button-close" id="titlebar-close" aria-label="关闭" title="关闭">
                <span>×</span>
            </button>
        </div>
    </div>
    <div class="app-container">
        <aside class="sidebar" role="complementary">
            <header class="logo">
                <img src="assets/logo.png" alt="Logo" class="logo-icon-img">
            </header>

            <nav class="nav-menu" role="navigation" aria-label="主导航">
                <button class="nav-item active" data-page="channels" aria-label="渠道管理" aria-current="page">
                    <span class="nav-icon" aria-hidden="true">🏠</span>
                    <span class="nav-text"></span>
                </button>
                <button class="nav-item" data-page="statusline" aria-label="Claude StatusLine">
                    <span class="nav-icon" aria-hidden="true">📊</span>
                    <span class="nav-text"></span>
                </button>
                <button class="nav-item" data-page="codex" aria-label="Codex 渠道">
                    <span class="nav-icon" aria-hidden="true">📘</span>
                    <span class="nav-text"></span>
                </button>
                <button class="nav-item" data-page="droid" aria-label="Droid 渠道">
                    <span class="nav-icon" aria-hidden="true">🤖</span>
                    <span class="nav-text"></span>
                </button>
                <button class="nav-item" data-page="settings" aria-label="设置">
                    <span class="nav-icon" aria-hidden="true">⚙️</span>
                    <span class="nav-text"></span>
                </button>
            </nav>

            <div class="sidebar-theme-switch">
                <label class="theme-switch" id="theme-toggle-btn" aria-label="切换主题">
                    <input type="checkbox" id="theme-checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <footer class="version" id="version-easter-egg"></footer>
        </aside>

        <main class="main-content" role="main">
            <section id="channels-page" class="page active">
                <header class="page-header">
                    <div class="header-left">
                        <h2 class="page-title"></h2>
                        <span class="channel-count" aria-live="polite"></span>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-secondary" id="locate-active-btn" aria-label="定位到激活渠道" title="定位到激活渠道">
                            <span aria-hidden="true">🎯</span>
                        </button>
                        <button class="btn btn-secondary" id="refresh-channel-btn" aria-label="刷新渠道列表">
                            <span aria-hidden="true">🔄</span>
                            <span></span>
                        </button>
                        <button class="btn btn-primary" id="add-channel-btn" aria-label="新建渠道">
                            <span aria-hidden="true">➕</span>
                            <span></span>
                        </button>
                    </div>
                </header>

                <div class="channels-container" id="channels-list" role="list"></div>
            </section>

            <section id="codex-page" class="page">
                <header class="page-header">
                    <div class="header-left">
                        <h2 class="page-title"></h2>
                        <span class="codex-channel-count" aria-live="polite"></span>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-secondary" id="refresh-codex-btn" aria-label="刷新渠道列表">
                            <span aria-hidden="true">🔄</span>
                            <span></span>
                        </button>
                        <button class="btn btn-primary" id="add-codex-btn" aria-label="新建渠道">
                            <span aria-hidden="true">➕</span>
                            <span></span>
                        </button>
                    </div>
                </header>

                <div class="channels-container" id="codex-list" role="list"></div>
            </section>

            <section id="droid-page" class="page">
                <header class="page-header">
                    <div class="header-left">
                        <h2 class="page-title"></h2>
                        <span class="droid-channel-count" aria-live="polite"></span>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-secondary" id="refresh-droid-btn" aria-label="刷新渠道列表">
                            <span aria-hidden="true">🔄</span>
                            <span></span>
                        </button>
                        <button class="btn btn-primary" id="add-droid-btn" aria-label="新建渠道">
                            <span aria-hidden="true">➕</span>
                            <span></span>
                        </button>
                    </div>
                </header>

                <div class="channels-container" id="droid-list" role="list"></div>
            </section>

            <section id="statusline-page" class="page">
                <div class="statusline-layout">
                    <!-- 左侧：配置编辑区域 -->
                    <div class="config-panel">
                        <div class="config-section">
                            <div class="section-header">
                                <h3></h3>
                                <span class="current-file-name" id="current-file-name"></span>
                            </div>

                            <!-- 显示项目 -->
                            <div class="items-section">
                                <h4></h4>
                                <div class="items-list" id="statusline-items"></div>
                            </div>

                            <!-- 分隔线配置 -->
                            <div class="separator-section">
                                <h4></h4>
                                <div class="separator-config-row">
                                    <input type="text" id="separator-input" class="separator-text-input" value="|"
                                        maxlength="3" title="分隔符">
                                    <input type="color" id="separator-color-picker" value="#d0d0d0"
                                        class="color-picker-input">
                                    <input type="text" id="separator-color-hex" class="color-hex-input" value="#d0d0d0"
                                        maxlength="7">
                                    <label class="separator-checkbox">
                                        <input type="checkbox" id="separator-start">
                                        <span>开头</span>
                                    </label>
                                    <label class="separator-checkbox">
                                        <input type="checkbox" id="separator-end">
                                        <span>结尾</span>
                                    </label>
                                </div>
                            </div>

                            <!-- 实时预览 -->
                            <div class="preview-section">
                                <div class="preview-header">
                                    <h4></h4>
                                    <div class="preview-bg-config">
                                        <input type="color" id="preview-bg-picker" value="#1e1e1e"
                                            class="color-picker-input" title="预览背景色">
                                        <input type="text" id="preview-bg-hex" class="color-hex-input" value="#1e1e1e"
                                            maxlength="7">
                                    </div>
                                </div>
                                <div class="terminal-preview" id="terminal-preview">
                                    <div class="preview-line top"></div>
                                    <div class="preview-cursor">█</div>
                                    <div class="preview-line bottom"></div>
                                    <div class="terminal-statusline" id="preview-statusline"></div>
                                </div>
                            </div>

                            <!-- 操作按钮 -->
                            <div class="config-actions">
                                <button class="btn btn-primary" id="create-new-btn">
                                    <span aria-hidden="true">➕</span>
                                    <span></span>
                                </button>
                                <button class="btn btn-success" id="save-current-btn">
                                    <span aria-hidden="true">💾</span>
                                    <span></span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧：文件列表 -->
                    <div class="files-panel">
                        <div class="files-header">
                            <h3></h3>
                            <div class="files-header-actions">
                                <button class="btn btn-secondary btn-small" id="refresh-files-btn" title="刷新列表">
                                    <span aria-hidden="true">🔄</span>
                                    <span></span>
                                </button>
                            </div>
                        </div>
                        <div class="files-list" id="statusline-files">
                            <!-- 文件列表动态生成 -->
                        </div>
                    </div>
                </div>
            </section>

            <section id="settings-page" class="page">
                <header class="page-header">
                    <h2 class="page-title"></h2>
                </header>

                <div class="settings-container">
                    <article class="setting-card" id="setting-claude-path">
                        <h3 class="setting-title"></h3>
                        <p class="setting-description"></p>
                        <div class="setting-input-group">
                            <label for="config-path-input" class="sr-only">配置文件路径</label>
                            <input type="text" id="config-path-input" class="setting-input" readonly
                                aria-readonly="true">
                            <button class="btn btn-secondary" id="browse-path-btn" aria-label="浏览文件夹"></button>
                        </div>
                    </article>

                    <article class="setting-card" id="setting-codex-path">
                        <h3 class="setting-title"></h3>
                        <p class="setting-description"></p>
                        <div class="setting-input-group">
                            <label for="codex-path-input" class="sr-only">Codex 配置文件路径</label>
                            <input type="text" id="codex-path-input" class="setting-input" readonly
                                aria-readonly="true">
                            <button class="btn btn-secondary" id="browse-codex-path-btn" aria-label="浏览文件夹"></button>
                        </div>
                    </article>

                    <article class="setting-card" id="setting-terminal-dir">
                        <h3 class="setting-title"></h3>
                        <p class="setting-description"></p>
                        <div class="setting-input-group">
                            <label for="terminal-dir-input" class="sr-only">工作目录路径</label>
                            <input type="text" id="terminal-dir-input" class="setting-input" readonly
                                aria-readonly="true">
                            <button class="btn btn-secondary" id="browse-terminal-dir-btn" aria-label="浏览文件夹"></button>
                        </div>
                    </article>

                    <article class="setting-card" id="setting-theme">
                        <h3 class="setting-title"></h3>
                        <p class="setting-description"></p>
                        <div class="preset-buttons" role="group" aria-label="主题选择">
                            <button class="btn btn-preset theme-btn" data-theme="dark" aria-label="深色主题">
                            </button>
                            <button class="btn btn-preset theme-btn" data-theme="light" aria-label="浅色主题">
                            </button>
                        </div>
                    </article>

                    <article class="setting-card" id="setting-language">
                        <h3 class="setting-title"></h3>
                        <p class="setting-description"></p>
                        <div class="preset-buttons" role="group" aria-label="语言选择">
                            <button class="btn btn-preset language-btn" data-language="zh-CN" aria-label="简体中文">
                            </button>
                            <button class="btn btn-preset language-btn" data-language="en-US" aria-label="English">
                            </button>
                        </div>
                    </article>

                    <article class="setting-card about-card" id="setting-about">
                        <h3 class="setting-title about-title"></h3>

                        <p class="about-description"></p>
                        <p class="about-tech-text"></p>

                        <div class="about-links">
                            <a href="https://github.com/changingshow/claude-channel-switcher" target="_blank"
                                rel="noopener noreferrer" class="about-link-btn">
                                <svg class="github-icon" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
                                    <path
                                        d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
                                    </path>
                                </svg>
                                <span class="link-text">GitHub</span>
                            </a>
                            <a href="https://github.com/changingshow/claude-channel-switcher/issues" target="_blank"
                                rel="noopener noreferrer" class="about-link-btn">
                                <span class="link-icon">💬</span>
                                <span class="link-text"></span>
                            </a>
                        </div>

                        <div class="about-footer">
                            <span class="about-copyright"></span>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <div class="modal" id="channel-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content">
            <header class="modal-header">
                <h3 class="modal-title" id="modal-title"></h3>
                <button class="modal-close" id="modal-close-btn" aria-label="关闭对话框">✕</button>
            </header>
            <form class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="channel-name-input"></label>
                    <input type="text" id="channel-name-input" class="form-input" placeholder="" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel-token-input"></label>
                    <input type="text" id="channel-token-input" class="form-input" placeholder="" required
                        autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel-url-input"></label>
                    <input type="url" id="channel-url-input" class="form-input" placeholder="" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel-model-input">自定义模型名称（可选）</label>
                    <input type="text" id="channel-model-input" class="form-input"
                        placeholder="例如：claude-sonnet-4-5-20250929">
                    <small id="channel-model-help"
                        style="color: #999; font-size: 11px; margin-top: 4px; display: block; opacity: 0.7;">
                        可在输入框内使用 /model 命令切换至此模型
                    </small>
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel-balance-url-input">余额查询地址（可选）</label>
                    <input type="text" id="channel-balance-url-input" class="form-input"
                        placeholder="https://api.xxx.com/balance?key={key}">
                    <small style="color: #999; font-size: 11px; margin-top: 4px; display: block; opacity: 0.7;">
                        使用 {key} 作为 API-Token 占位符
                    </small>
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel-balance-method">查询方法</label>
                    <div class="custom-select" id="channel-balance-method-select">
                        <div class="custom-select-trigger">
                            <span class="custom-select-value">POST</span>
                            <span class="custom-select-arrow"></span>
                        </div>
                        <div class="custom-select-options">
                            <div class="custom-select-option selected" data-value="POST">POST</div>
                            <div class="custom-select-option" data-value="GET">GET</div>
                        </div>
                        <input type="hidden" id="channel-balance-method" value="POST">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel-balance-field-input"
                        id="balance-field-label">余额字段（可选）</label>
                    <input type="text" id="channel-balance-field-input" class="form-input"
                        placeholder="例如：balance 或 data.balance">
                    <small style="color: #999; font-size: 11px; margin-top: 4px; display: block; opacity: 0.7;">
                        指定从响应 JSON 中提取的字段路径
                    </small>
                </div>
            </form>
            <footer class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel-btn" type="button"></button>
                <button class="btn btn-primary" id="modal-save-btn" type="button"></button>
            </footer>
        </div>
    </div>

    <!-- Droid 渠道模态框 -->
    <div class="modal" id="droid-modal" role="dialog" aria-modal="true" aria-labelledby="droid-modal-title">
        <div class="modal-content">
            <header class="modal-header">
                <h3 class="modal-title" id="droid-modal-title"></h3>
                <button class="modal-close" id="droid-modal-close-btn" aria-label="关闭对话框">✕</button>
            </header>
            <form class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="droid-name-input"></label>
                    <input type="text" id="droid-name-input" class="form-input" placeholder="" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="droid-apikey-input"></label>
                    <input type="text" id="droid-apikey-input" class="form-input" placeholder="" required
                        autocomplete="off">
                </div>
            </form>
            <footer class="modal-footer">
                <button class="btn btn-secondary" id="droid-modal-cancel-btn" type="button"></button>
                <button class="btn btn-primary" id="droid-modal-save-btn" type="button"></button>
            </footer>
        </div>
    </div>

    <!-- Codex 渠道模态框 -->
    <div class="modal" id="codex-modal" role="dialog" aria-modal="true" aria-labelledby="codex-modal-title">
        <div class="modal-content">
            <header class="modal-header">
                <h3 class="modal-title" id="codex-modal-title"></h3>
                <button class="modal-close" id="codex-modal-close-btn" aria-label="关闭对话框">✕</button>
            </header>
            <form class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="codex-name-input"></label>
                    <input type="text" id="codex-name-input" class="form-input" placeholder=""
                        maxlength="18" pattern="[A-Za-z0-9\-_]+" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="codex-baseurl-input"></label>
                    <input type="text" id="codex-baseurl-input" class="form-input" placeholder="" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="codex-apikey-input"></label>
                    <input type="text" id="codex-apikey-input" class="form-input" placeholder="" required
                        autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="codex-model-input"></label>
                    <input type="text" id="codex-model-input" class="form-input" placeholder="">
                </div>
            </form>
            <footer class="modal-footer">
                <button class="btn btn-secondary" id="codex-modal-cancel-btn" type="button"></button>
                <button class="btn btn-primary" id="codex-modal-save-btn" type="button"></button>
            </footer>
        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- 烟花画布 -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- 确认对话框 -->
    <div class="confirm-dialog" id="confirm-dialog" role="alertdialog" aria-modal="true">
        <div class="confirm-dialog-content">
            <div class="confirm-dialog-body">
                <h3 class="confirm-dialog-title" id="confirm-dialog-title"></h3>
                <p class="confirm-dialog-message" id="confirm-dialog-message"></p>
            </div>
            <div class="confirm-dialog-footer">
                <button class="confirm-dialog-btn confirm-dialog-btn-cancel" id="confirm-dialog-cancel"></button>
                <button class="confirm-dialog-btn confirm-dialog-btn-confirm" id="confirm-dialog-confirm"></button>
            </div>
        </div>
    </div>

    <!-- 国际化模块 -->
    <script src="i18n.js"></script>

    <!-- 工具模块 -->
    <script src="js/utils/error.js"></script>
    <script src="js/utils/debounce.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/utils/validation.js"></script>

    <!-- 核心模块 -->
    <script src="js/core/api.js"></script>
    <script src="js/core/state.js"></script>

    <!-- UI 模块 -->
    <script src="js/ui/toast.js"></script>
    <script src="js/ui/modal.js"></script>
    <script src="js/ui/confirm.js"></script>
    <script src="js/ui/navigation.js"></script>
    <script src="js/ui/titlebar.js"></script>
    <script src="js/ui/elastic-scroll.js"></script>

    <!-- 功能模块 -->
    <script src="js/features/theme.js"></script>
    <script src="js/features/channels.js"></script>
    <script src="js/features/codex.js"></script>
    <script src="js/features/droid.js"></script>
    <script src="js/features/settings.js"></script>
    <script src="js/features/fireworks.js"></script>
    <script src="js/features/statusline.js"></script>

    <!-- 主入口 -->
    <script src="app.js"></script>
</body>

</html>
